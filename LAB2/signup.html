<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Sign Up</title>
        <link rel="stylesheet" type="text/css" href="main.css">
    </head>
    <body>
        <h1>Welcome to INTERNET PROGRAMMING MOVIE SITE</h1>
        <div id="anchor">
            <a href="login.html">로그인</a>
            <p id="bar"> | </p>
            <a href="signup.html">회원가입</a>
        </div>
        <div id="form_box">
            <form method="post" id="input_box">
                <div id="name_box">
                    <label for="name">이름 : </label>
                    <input type="text" id="name" autofocus required>
                </div>
                <div id="birth_box">
                    <label for="birth">생일 : </label>
                    <input type="date" id="birth" required>
                </div>
                <div id="gender_box">
                    <span>성별 : </span>
                    <input type="radio" name="gender" id="male" required>
                    <label for="male"> 남자</label>
                    <input type="radio" name="gender" id="female">
                    <label for="female"> 여자</label>
                </div>
                <div id="grade_box">
                    <label for="grade">학년: </label>
                    <input type="number" id="grade" min="1" max="4" step="1" required>
                </div>
                <div id="id_box">
                    <label for="id">아이디 : </label>
                    <input type="text" id="id" autocomplete required>
                </div>
                <div id="password_box">
                    <label for="password">비밀번호 : </label>
                    <input type="password" id="password" required>
                </div>
                <div id="email_box">
                    <label for="email">이메일 : </label>
                    <input type="email" id="email" required>
                </div>
                <div id="question_box">
                    <label for="question">보안질문 : </label>
                    <select id="question" required>
                        <option value="">질문을 선택하세요</option>
                        <option value="first_gf">처음만난 여자친구 이름은?</option>
                        <option value="first_country">"처음으로 해외여행갔던 나라 이름은?"</option>
                        <option value="parent_birth">"부모님의 출생년도는?"</option>
                    </select>
                </div>
                <div id="answer_box">
                    <label for="answer">답변 : </label>
                    <input type="text" id="answer" required>
                </div>
                <div id="button_box">
                    <button id="signup">Signup</button>
                    <button id="login">Cancel</button>
                </div>
            </form>
        </div>
    </body>
</html>
